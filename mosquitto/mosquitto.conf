listener 1883
allow_anonymous false
log_dest stdout

# go-auth plugin – HTTP-Backend für dynamische Pi-Geräte-Auth
auth_plugin /mosquitto/go-auth.so

auth_opt_backends http
auth_opt_cache false
auth_opt_log_level info

# Backend ist der ycontrol-backend Container im gleichen Docker-Netzwerk
auth_opt_http_host backend
auth_opt_http_port 3000

# HTTP-Auth Endpunkte
auth_opt_http_getuser_uri    /api/devices/mqtt-auth
auth_opt_http_aclcheck_uri   /api/devices/mqtt-acl
auth_opt_http_method         POST
auth_opt_http_response_mode  status
