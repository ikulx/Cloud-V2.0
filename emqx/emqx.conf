## YControl Cloud – EMQX 5 Konfiguration

node {
  name = "emqx@127.0.0.1"
  cookie = "ycontrol-emqx-cookie"
  data_dir = "/opt/emqx/data"
}

cluster {
  name = emqxcl
  discovery_strategy = manual
}

dashboard {
  listeners {
    http { bind = 18083 }
  }
  default_username = "admin"
  default_password = "admin123"
}

listeners {
  tcp {
    default {
      bind = "0.0.0.0:1883"
      max_connections = 1024000
    }
  }
  ws {
    default {
      bind = "0.0.0.0:8083"
    }
  }
}

## HTTP-Authentifizierung: Nur registrierte & freigegebene Pis dürfen verbinden
authentication = [
  {
    mechanism = password_based
    backend = http
    enable = true

    method = post
    url = "http://host.docker.internal:3000/api/devices/mqtt-auth"

    body {
      username = "${username}"
      password = "${password}"
    }

    headers {
      "content-type"      = "application/json"
      "x-internal-secret" = "dev-mqtt-internal-secret"
    }

    request_timeout = "5s"
    connect_timeout = "5s"
  }
]

## ACL: Topic-Isolation pro Gerät
authorization {
  no_match = deny
  deny_action = disconnect
  sources = [
    {
      type = file
      enable = true
      path = "/opt/emqx/etc/acl.conf"
    }
  ]
}
