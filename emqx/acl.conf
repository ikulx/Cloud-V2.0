%% YControl Cloud – EMQX ACL Rules
%% Backend-Client und Admin dürfen alles
{allow, {user, "backend-client"}, all, ["#"]}.
{allow, {user, "admin"}, all, ["#"]}.

%% Pi-Geräte: dürfen nur ihre eigenen Topics nutzen
%% username = serialNumber des Geräts
{allow, all, subscribe, ["yc/${username}/cmnd"]}.
{allow, all, publish,   ["yc/${username}/stat", "yc/${username}/tele", "yc/${username}/resp"]}.

%% Alles andere ablehnen
{deny, all}.
